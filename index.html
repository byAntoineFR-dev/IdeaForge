<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Génère des idées de jeux uniques et variées. Forge tes idées, crée ton jeu.">
  <title>IdeaForge — Générateur d'idées de jeux</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Particle layer -->
<div class="particles" id="particles" aria-hidden="true"></div>

<!-- App wrapper -->
<div class="app">

  <!-- ── HEADER ─────────────────────────────── -->
  <header class="header">
    <div class="logo">
      <span class="logo-title">IdeaForge</span>
      <span class="logo-slogan">Forge tes idées, crée ton jeu.</span>
    </div>
    <div class="header-actions">
      <button class="btn-icon" id="btn-theme" title="Changer le thème" aria-label="Basculer thème">🌙</button>
    </div>
  </header>

  <!-- ── CATEGORIES ────────────────────────── -->
  <div class="section-label">Choisir une catégorie</div>
  <div class="categories" id="categories-grid" role="group" aria-label="Catégories de jeux">
    <!-- Injected by JS -->
  </div>

  <!-- ── GENERATE BUTTON ───────────────────── -->
  <div class="generate-zone">
    <button class="btn-generate" id="btn-generate" aria-label="Générer une idée">
      <span class="btn-inner">
        <span class="spark">⚡</span>
        Générer une idée
      </span>
    </button>
  </div>

  <!-- ── IDEA CARD ──────────────────────────── -->
  <div class="idea-card" id="idea-card" role="region" aria-label="Idée générée" aria-live="polite">
    <div id="idea-placeholder" class="idea-placeholder">
      <span class="idea-placeholder-icon">🎲</span>
      <p>Choisis une catégorie<br>et clique sur Générer !</p>
      <small style="color:var(--text3); font-size:11px;">ou appuie sur Espace</small>
    </div>
    <div id="idea-content" class="idea-content">
      <!-- Injected by JS -->
    </div>
    <div id="action-buttons" style="display:flex; gap:10px; flex-wrap:wrap;">
      <!-- Injected by JS -->
    </div>
  </div>

  <!-- ── SAVED IDEAS ────────────────────────── -->
  <section class="saved-section" aria-label="Idées sauvegardées">
    <hr class="divider">
    <div class="saved-header">
      <div style="display:flex; align-items:center; gap:10px;">
        <span class="section-label" style="margin-bottom:0">Mes idées sauvegardées</span>
        <span class="saved-count" id="saved-count">0</span>
      </div>
      <button class="btn-clear" id="btn-clear-saved" aria-label="Tout effacer">Tout effacer</button>
    </div>
    <div class="saved-list" id="saved-list" role="list">
      <!-- Injected by JS -->
    </div>
  </section>

</div>

<!-- Toast container -->
<div class="toast-container" id="toast-container" aria-live="assertive" aria-atomic="true"></div>

<!-- Scripts -->
<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
